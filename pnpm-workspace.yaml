allowBuilds:
  '@biomejs/biome': true
  '@fortawesome/fontawesome-free': true
  core-js: true
  esbuild: true

minimumReleaseAgeExclude:
  - brace-expansion@2.0.3 || 5.0.5 || 5.0.6
  - picomatch@2.3.2
  - lodash@4.17.24
  - fast-uri@3.1.1 || 3.1.2
  - '@babel/plugin-transform-modules-systemjs@7.29.4'
  - '@babel/core@7.29.1'

# Transitive dependency pins to resolve `pnpm audit` findings (all from
# vite-plugin-pwa > workbox-build). See `pnpm why <pkg>` for the chain.
overrides:
  '@babel/core@<=7.29.0': ^7.29.1
  '@babel/plugin-transform-modules-systemjs@>=7.12.0 <=7.29.3': ^7.29.4
  brace-expansion@>=2.0.0 <2.0.3: ^2.0.3
  brace-expansion@>=4.0.0 <5.0.5: ^5.0.5
  brace-expansion@>=5.0.0 <5.0.6: ^5.0.6
  fast-uri@<=3.1.0: ^3.1.1
  fast-uri@<=3.1.1: ^3.1.2
  lodash@<=4.17.23: ^4.17.24
  lodash@>=4.0.0 <=4.17.23: ^4.17.24
  picomatch@<2.3.2: ^2.3.2
  serialize-javascript: '>=7.0.3'
